<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>ExpenseWise - Smart Expense Tracking & Financial Management</title>
    <meta name="title" content="ExpenseWise - Smart Expense Tracking & Financial Management" />
    <meta name="description" content="Track expenses, manage budgets, and gain financial insights with ExpenseWise. The modern, intuitive expense tracking app that helps you control your money and achieve your financial goals." />
    <meta name="author" content="ExpenseWise" />
    <meta name="keywords" content="expense tracking, budget management, personal finance, money management, financial planning, expense tracker, budget app" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://expensewise.app/" />
    <meta property="og:title" content="ExpenseWise - Smart Expense Tracking & Financial Management" />
    <meta property="og:description" content="Track expenses, manage budgets, and gain financial insights with ExpenseWise. The modern, intuitive expense tracking app." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ExpenseWise" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://expensewise.app/" />
    <meta property="twitter:title" content="ExpenseWise - Smart Expense Tracking & Financial Management" />
    <meta property="twitter:description" content="Track expenses, manage budgets, and gain financial insights with ExpenseWise. The modern, intuitive expense tracking app." />
    <meta property="twitter:image" content="/og-image.png" />
    <meta name="twitter:site" content="@ExpenseWise" />
    <meta name="twitter:creator" content="@ExpenseWise" />

    <!-- Additional SEO -->
    <link rel="canonical" href="https://expensewise.app/" />
    <link rel="alternate" hreflang="en" href="https://expensewise.app/" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ExpenseWise",
      "description": "Smart expense tracking and financial management application",
      "url": "https://expensewise.app/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "1250"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
